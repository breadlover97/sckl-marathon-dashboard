name: Sync data and deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Runs at 12:15am Asia/Singapore time.
    - cron: "15 16 * * *"

permissions:
  contents: read
  deployments: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install sync dependencies
        run: python -m pip install -r requirements.txt

      - name: Check sync secrets
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          missing=0
          for name in GOOGLE_SERVICE_ACCOUNT_JSON STRAVA_CLIENT_ID STRAVA_CLIENT_SECRET STRAVA_REFRESH_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required repository secret: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Process nutrition AI
        run: |
          python scripts/process_nutrition_ai.py
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID || '1sx46WZYNJNBBTtPoG2E3obdVrzUIhfa7-m84DWOvVDo' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_NUTRITION_MODEL: ${{ vars.OPENAI_NUTRITION_MODEL || 'gpt-4.1-mini' }}

      - name: Fetch Strava run activities
        id: fetch_strava
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          after_timestamp="$(python - <<'PY'
          from datetime import datetime, timezone
          print(int(datetime(2026, 5, 1, tzinfo=timezone.utc).timestamp()))
          PY
          )"
          if python scripts/fetch_strava.py --after "$after_timestamp"; then
            echo "fresh=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Strava sync failed; deploying with existing data/strava-activities.json."
            echo "fresh=false" >> "$GITHUB_OUTPUT"
            test -s data/strava-activities.json
          fi

      - name: Write Strava actuals to Google Sheet
        if: steps.fetch_strava.outputs.fresh == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID || '1sx46WZYNJNBBTtPoG2E3obdVrzUIhfa7-m84DWOvVDo' }}
          GOOGLE_SHEET_RANGE: A:AQ
          STRAVA_ACTIVITIES_OUTPUT: data/strava-activities.json
        run: python scripts/sync_strava_actuals_to_sheet.py

      - name: Fetch Google Sheet plan
        run: python scripts/fetch_google_sheet.py
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID || '1sx46WZYNJNBBTtPoG2E3obdVrzUIhfa7-m84DWOvVDo' }}
          GOOGLE_SHEET_RANGE: A:AQ

      - name: Prepare Cloudflare Pages output
        run: |
          mkdir -p _site/data
          cp index.html backend.html race.html nutrition.html styles.css app.js race.js nutrition.js theme.js _site/
          cp data/training-plan.json _site/data/
          cp data/strava-activities.json _site/data/
          cp data/supplements.json _site/data/
          cp data/nutrition.json _site/data/
          cp data/mock-training-plan.json _site/data/
          cp data/mock-strava-activities.json _site/data/
          cp data/mock-supplements.json _site/data/
          cp data/mock-nutrition.json _site/data/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'sckl-marathon-dashboard' }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
